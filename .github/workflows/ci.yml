name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ── Unit tests + type-check + build ───────────────────────────────────────
  unit:
    name: Type-check, Unit tests & Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Coverage gate (≥ 80% lines & functions, ≥ 60% branches)
        run: npm run coverage

      - name: Security check — no exec() or shell:true in source
        run: |
          # Fail if any source file uses exec() (but not execFile) in actual code.
          # Filter out comment lines (lines whose content starts with // or *).
          if grep -rn --include="*.ts" "exec(" src/ \
               | grep -v "execFile" \
               | grep -vE ':[0-9]+:\s*(//|\*)'; then
            echo "SECURITY VIOLATION: found exec() call in src/ — use execFile() instead" >&2
            exit 1
          fi
          # Fail if any source file passes shell: true to a child-process call.
          # Exclude comment lines so doc-strings that mention the rule don't trip this.
          if grep -rn --include="*.ts" "shell: true" src/ \
               | grep -vE ':[0-9]+:\s*(//|\*)'; then
            echo "SECURITY VIOLATION: found shell:true in src/ — never use shell: true" >&2
            exit 1
          fi
          echo "Security check passed: no exec() or shell:true found in non-comment code"

      - name: Production build
        run: npm run vscode:prepublish

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/extension.js
          retention-days: 7

  # ── Integration tests (real VSCode host) ──────────────────────────────────
  integration:
    name: Integration tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Production build (required for extension activation)
        run: npm run vscode:prepublish

      - name: Install Xvfb
        run: sudo apt-get install -y xvfb

      - name: Run integration tests
        run: xvfb-run -a npm run test:integration
        env:
          DISPLAY: ":99.0"
